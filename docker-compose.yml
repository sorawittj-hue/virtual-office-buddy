services:
  prism:
    build: .
    container_name: prism-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false   # copy .env.example → .env to override defaults
    environment:
      - NODE_ENV=production

  # ── Optional: Nginx reverse proxy with SSL ──────────────────────────────────
  # Uncomment to serve on port 80/443 with a domain name.
  # Requires: ./nginx/prism.conf and SSL certs in ./nginx/certs/
