  #   image: nginx:alpine
  #   container_name: virtual-office-buddy-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/virtual-office-buddy.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro
