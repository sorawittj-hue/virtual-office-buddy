name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → .cloudflare/v3/)
        run: npm run build

      - name: Show build output
        run: ls -la .cloudflare/v3/ 2>/dev/null && echo "---" && ls -la .cloudflare/ 2>/dev/null || echo "No .cloudflare output found"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy the pre-built Vite output without re-bundling
          command: deploy .cloudflare/v3/index.js --no-bundle --name=prism-dashboard --compatibility-date=2025-09-24 --compatibility-flags=nodejs_compat
